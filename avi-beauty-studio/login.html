<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login for Avi's Beauty Studio booking dashboard.">
  <meta name="theme-color" content="#0b0b0c">
  <title>Admin Login – Avi's Beauty Studio</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-brand">
      <img src="logo.png" alt="Avi's Beauty Studio" class="login-logo">
      <h1>Avi's <span>Beauty</span> Studio</h1>
      <p>Admin Dashboard</p>
    </div>

    <form class="login-form" onsubmit="event.preventDefault(); loginAdmin();">
      <label class="login-label" for="adminEmail">Email Address</label>
      <input type="email" id="adminEmail" placeholder="admin@avisbeautystudio.com" autocomplete="username" required>

      <label class="login-label" for="adminPassword">Password</label>
      <input type="password" id="adminPassword" placeholder="Enter your password" autocomplete="current-password" required>

      <button type="submit">Sign In</button>
    </form>

    <div id="loginMsg"></div>

    <a href="index.html" class="back-link">← Back to Website</a>
  </div>
</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
